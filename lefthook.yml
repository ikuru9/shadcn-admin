pre-commit:
  parallel: false
  commands:
    lint:
      glob: "**/*.{js,jsx,ts,tsx}"
      run: pnpm -s lint:staged {staged_files}
    format:
      glob: "**/*.{js,jsx,ts,tsx,json}"
      run: |
        pnpm -s fmt:staged {staged_files}
        git add {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm -s commitlint --edit {1}
