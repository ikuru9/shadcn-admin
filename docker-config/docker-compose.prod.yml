services:
  web:
    build:
      context: ..
      dockerfile: docker-config/Dockerfile
      args:
        ENV_MODE: production
    container_name: shadcn-admin-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certificates for production
      - /path/to/production/cert.pem:/etc/nginx/ssl/cert.pem:ro
      - /path/to/production/key.pem:/etc/nginx/ssl/key.pem:ro
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    env_file:
      - .env
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--quiet", "--tries=1", "--spider", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - prod-network

networks:
  prod-network:
    driver: bridge
