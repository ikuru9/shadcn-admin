services:
  web:
    build:
      context: ..
      dockerfile: docker-config/Dockerfile
      args:
        ENV_MODE: development
    container_name: shadcn-admin-dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
      - .env.development
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--quiet", "--tries=1", "--spider", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge
