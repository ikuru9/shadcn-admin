openapi: 3.0.4
info:
  title: Swagger 테스트 - OpenAPI 3.0
  description: |-
    유용한 링크:
    - [Pet Store 저장소](https://github.com/swagger-api/swagger-petstore)
    - [Pet Store 원본 API 정의](https://github.com/swagger-api/swagger-petstore/blob/master/src/main/resources/openapi.yaml)
  termsOfService: https://swagger.io/terms/
  contact:
    email: apiteam@swagger.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.27
externalDocs:
  description: Swagger 자세히 보기
  url: https://swagger.io
servers:
  - url: /api/v3
tags:
  - name: pet
    description: 반려동물 관련 기능
    externalDocs:
      description: 자세히 보기
      url: https://swagger.io
  - name: store
    description: Petstore 주문 접근
    externalDocs:
      description: 스토어 자세히 보기
      url: https://swagger.io
  - name: user
    description: 사용자 관련 기능
  - name: auth
    description: 인증 관련 기능
  - name: auth-group
    description: 인증 그룹 및 권한 관리
paths:
  /pet:
    put:
      tags:
        - pet
      summary: 기존 반려동물 수정
      description: ID로 기존 반려동물을 수정합니다.
      operationId: updatePet
      requestBody:
        description: 스토어의 기존 반려동물을 수정합니다.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
          application/xml:
            schema:
              $ref: "#/components/schemas/Pet"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Pet"
        required: true
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
            application/xml:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: 잘못된 ID가 전달됨
        "404":
          description: 반려동물을 찾을 수 없음
        "422":
          description: 유효성 검사 예외
        default:
          description: 예상하지 못한 오류
      security:
        - petstore_auth:
            - write:pets
            - read:pets
    post:
      tags:
        - pet
      summary: 새 반려동물 추가
      description: 스토어에 새 반려동물을 추가합니다.
      operationId: addPet
      requestBody:
        description: 스토어에 새 반려동물을 생성합니다.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
          application/xml:
            schema:
              $ref: "#/components/schemas/Pet"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Pet"
        required: true
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
            application/xml:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: 잘못된 입력
        "422":
          description: 유효성 검사 예외
        default:
          description: 예상하지 못한 오류
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  /pet/findByStatus:
    get:
      tags:
        - pet
      summary: 상태로 반려동물 검색
      description: 쉼표로 구분한 문자열로 여러 상태 값을 전달할 수 있습니다.
      operationId: findPetsByStatus
      parameters:
        - name: status
          in: query
          description: 필터에 사용할 상태 값
          required: true
          explode: true
          schema:
            type: string
            default: available
            enum:
              - available
              - pending
              - sold
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
            application/xml:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "400":
          description: 잘못된 상태 값
        default:
          description: 예상하지 못한 오류
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  /pet/findByTags:
    get:
      tags:
        - pet
      summary: 태그로 반려동물 검색
      description: "Multiple tags can be provided with comma separated strings. Use\
        \ tag1, tag2, tag3 for testing."
      operationId: findPetsByTags
      parameters:
        - name: tags
          in: query
          description: 필터링할 태그
          required: true
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
            application/xml:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "400":
          description: 잘못된 태그 값
        default:
          description: 예상하지 못한 오류
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  /pet/{petId}:
    get:
      tags:
        - pet
      summary: ID로 반려동물 조회
      description: 단일 반려동물을 반환합니다.
      operationId: getPetById
      parameters:
        - name: petId
          in: path
          description: 반환할 반려동물의 ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
            application/xml:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: 잘못된 ID가 전달됨
        "404":
          description: 반려동물을 찾을 수 없음
        default:
          description: 예상하지 못한 오류
      security:
        - api_key: []
        - petstore_auth:
            - write:pets
            - read:pets
    post:
      tags:
        - pet
      summary: 폼 데이터로 반려동물 수정
      description: 폼 데이터를 기준으로 반려동물 리소스를 수정합니다.
      operationId: updatePetWithForm
      parameters:
        - name: petId
          in: path
          description: 수정할 반려동물의 ID
          required: true
          schema:
            type: integer
            format: int64
        - name: name
          in: query
          description: 수정할 반려동물 이름
          schema:
            type: string
        - name: status
          in: query
          description: 수정할 반려동물 상태
          schema:
            type: string
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
            application/xml:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: 잘못된 입력
        default:
          description: 예상하지 못한 오류
      security:
        - petstore_auth:
            - write:pets
            - read:pets
    delete:
      tags:
        - pet
      summary: 반려동물 삭제
      description: 반려동물을 삭제합니다.
      operationId: deletePet
      parameters:
        - name: api_key
          in: header
          description: ""
          required: false
          schema:
            type: string
        - name: petId
          in: path
          description: 삭제할 반려동물 ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 반려동물 삭제됨
        "400":
          description: 잘못된 반려동물 값
        default:
          description: 예상하지 못한 오류
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  /pet/{petId}/uploadImage:
    post:
      tags:
        - pet
      summary: 이미지 업로드
      description: 반려동물 이미지를 업로드합니다.
      operationId: uploadFile
      parameters:
        - name: petId
          in: path
          description: 수정할 반려동물의 ID
          required: true
          schema:
            type: integer
            format: int64
        - name: additionalMetadata
          in: query
          description: 추가 메타데이터
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: 업로드된 파일이 없음
        "404":
          description: 반려동물을 찾을 수 없음
        default:
          description: 예상하지 못한 오류
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  /store/inventory:
    get:
      tags:
        - store
      summary: 상태별 재고 반환
      description: 상태 코드와 수량의 맵을 반환합니다.
      operationId: getInventory
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
        default:
          description: 예상하지 못한 오류
      security:
        - api_key: []
  /store/order:
    post:
      tags:
        - store
      summary: 반려동물 주문 생성
      description: 스토어에 새 주문을 생성합니다.
      operationId: placeOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
          application/xml:
            schema:
              $ref: "#/components/schemas/Order"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: 잘못된 입력
        "422":
          description: 유효성 검사 예외
        default:
          description: 예상하지 못한 오류
  /store/order/{orderId}:
    get:
      tags:
        - store
      summary: 주문 ID로 조회
      description: 유효한 응답을 보려면 5 이하 또는 10 초과의 정수 ID를 사용하세요. 다른 값은 예외를 발생시킵니다.
      operationId: getOrderById
      parameters:
        - name: orderId
          in: path
          description: 조회할 주문 ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
            application/xml:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: 잘못된 ID가 전달됨
        "404":
          description: 주문을 찾을 수 없음
        default:
          description: 예상하지 못한 오류
    delete:
      tags:
        - store
      summary: 주문 ID로 삭제
      description: 유효한 응답을 보려면 1000 미만의 정수 ID를 사용하세요. 1000 초과나 정수가 아닌 값은 API 오류를 발생시킵니다.
      operationId: deleteOrder
      parameters:
        - name: orderId
          in: path
          description: 삭제할 주문 ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 주문 삭제됨
        "400":
          description: 잘못된 ID가 전달됨
        "404":
          description: 주문을 찾을 수 없음
        default:
          description: 예상하지 못한 오류
  /users:
    get:
      tags:
        - user
      summary: 사용자 목록 조회
      operationId: listUsers
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags:
        - user
      summary: 사용자 생성
      operationId: createManagedUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /users/{id}:
    get:
      tags:
        - user
      summary: 사용자 조회
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      tags:
        - user
      summary: 사용자 수정
      operationId: updateUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      tags:
        - user
      summary: 사용자 삭제
      operationId: deleteUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 사용자 삭제됨
  /users/my-menus:
    get:
      tags:
        - user
      summary: 현재 사용자 메뉴 조회
      operationId: getMyMenus
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuKeyListResponse"
  /auth-groups:
    get:
      tags:
        - auth-group
      summary: 인증 그룹 목록 조회
      operationId: listAuthGroups
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthGroup"
    post:
      tags:
        - auth-group
      summary: 인증 그룹 생성
      operationId: createAuthGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthGroupCreate"
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthGroup"
  /auth-groups/{id}:
    get:
      tags:
        - auth-group
      summary: 인증 그룹 조회
      operationId: getAuthGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthGroup"
    patch:
      tags:
        - auth-group
      summary: 인증 그룹 수정
      operationId: updateAuthGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthGroupUpdate"
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthGroup"
    delete:
      tags:
        - auth-group
      summary: 인증 그룹 삭제
      operationId: deleteAuthGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 인증 그룹이 삭제됨
  /auth-groups/{id}/permissions:
    get:
      tags:
        - auth-group
      summary: 인증 그룹 권한 조회
      operationId: getAuthGroupPermissions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"
    put:
      tags:
        - auth-group
      summary: 인증 그룹 권한 수정
      operationId: updateAuthGroupPermissions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Permission"
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"
  /auth/login:
    post:
      tags:
        - auth
      summary: 로그인
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /auth/refresh:
    post:
      tags:
        - auth
      summary: 토큰 갱신
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: 성공적으로 처리됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        petId:
          type: integer
          format: int64
          example: 198772
        quantity:
          type: integer
          format: int32
          example: 7
        shipDate:
          type: string
          format: date-time
        status:
          type: string
          description: 주문 상태
          example: approved
          enum:
            - placed
            - approved
            - delivered
        complete:
          type: boolean
      xml:
        name: order
    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Dogs
      xml:
        name: category
    User:
      type: object
      required:
        - id
        - name
        - email
        - authGroupId
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        authGroupId:
          type: string
          format: uuid
    UserCreate:
      allOf:
        - type: object
          required:
            - name
            - email
            - authGroupId
          properties:
            name:
              type: string
            email:
              type: string
              format: email
            authGroupId:
              type: string
              format: uuid
        - $ref: "#/components/schemas/UserPassword"
    UserUpdate:
      allOf:
        - type: object
          required:
            - name
            - email
            - authGroupId
          properties:
            name:
              type: string
            email:
              type: string
              format: email
            authGroupId:
              type: string
              format: uuid
        - $ref: "#/components/schemas/UserPassword"
    UserPassword:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          format: password
    AuthGroup:
      type: object
      required:
        - id
        - name
        - description
        - permissions
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
    AuthGroupCreate:
      type: object
      required:
        - name
        - description
        - permissions
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
    AuthGroupUpdate:
      type: object
      required:
        - name
        - description
        - permissions
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
    PermissionCrud:
      type: object
      required:
        - create
        - read
        - update
        - delete
      properties:
        create:
          type: boolean
        read:
          type: boolean
        update:
          type: boolean
        delete:
          type: boolean
    Permission:
      type: object
      required:
        - menuKey
        - extras
        - crud
      properties:
        menuKey:
          type: string
        extras:
          type: array
          items:
            type: string
        crud:
          $ref: "#/components/schemas/PermissionCrud"
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required:
        - accessToken
        - refreshToken
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    MenuKeyListResponse:
      type: object
      required:
        - menuKeys
      properties:
        menuKeys:
          type: array
          items:
            type: string
    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      xml:
        name: tag
    Pet:
      required:
        - name
        - photoUrls
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: doggie
        category:
          $ref: "#/components/schemas/Category"
        photoUrls:
          type: array
          xml:
            wrapped: true
          items:
            type: string
            xml:
              name: photoUrl
        tags:
          type: array
          xml:
            wrapped: true
          items:
            $ref: "#/components/schemas/Tag"
        status:
          type: string
          description: 스토어 내 반려동물 상태
          enum:
            - available
            - pending
            - sold
      xml:
        name: pet
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
      xml:
        name: "##default"
  requestBodies:
    Pet:
      description: 스토어에 추가할 반려동물 객체
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Pet"
        application/xml:
          schema:
            $ref: "#/components/schemas/Pet"
    UserArray:
      description: 사용자 객체 목록
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/User"
  securitySchemes:
    petstore_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://petstore3.swagger.io/oauth/authorize
          scopes:
            write:pets: modify pets in your account
            read:pets: read your pets
    api_key:
      type: apiKey
      name: api_key
      in: header
